<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDFBolt ⚡ - Futuristic PDF Tools</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<!-- NAVBAR -->
<header class="nav">
    <div class="logo">
        <img src="logo-icon.png">
        <span>PDFBolt</span>
    </div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Tools</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</header>

<!-- HERO -->
<section class="hero">
    <div class="hero-left">
        <h1>Next-Gen <span>PDF Tools</span></h1>
        <p>Fast, secure and futuristic document tools.</p>
        <button class="cta">🚀 Start Now</button>
    </div>

    <div class="hero-right">
        <img src="logo-banner.png" class="hero-img">
    </div>
</section>

<!-- TOOL GRID -->
<section class="tools">

<div class="card" onclick="showImageTool()">
<i data-lucide="image"></i>
<p>Image to PDF</p>
</div>

<div class="card" onclick="showMergeTool()">
<i data-lucide="files"></i>
<p>Merge PDF</p>
</div>

<div class="card" onclick="showCompressTool()">
<i data-lucide="minimize-2"></i>
<p>Compress PDF</p>
</div>

<div class="card">
<i data-lucide="scissors"></i>
<p>Split PDF</p>
</div>

<div class="card">
<i data-lucide="rotate-cw"></i>
<p>Rotate PDF</p>
</div>

<div class="card">
<i data-lucide="file-text"></i>
<p>PDF → Word</p>
</div>

<div class="card">
<i data-lucide="file-plus"></i>
<p>Word → PDF</p>
</div>

<div class="card">
<i data-lucide="lock"></i>
<p>Protect PDF</p>
</div>

</section>

<!-- ================= TOOLS ================= -->

<!-- IMAGE -->
<div id="imageSection" class="tool-box hidden">
    <h2>Image to PDF</h2>
    <input type="file" id="imageInput" multiple>
    <button onclick="convertToPDF()">Convert</button>
</div>

<!-- MERGE -->
<div id="mergeSection" class="tool-box hidden">
    <h2>Merge PDF</h2>
    <input type="file" id="pdfInput" multiple>
    <button onclick="mergePDF()">Merge</button>
</div>

<!-- COMPRESS -->
<div id="compressSection" class="tool-box hidden">
    <h2>Compress PDF</h2>
    <input type="file" id="compressInput">
    <button onclick="compressPDF()">Compress</button>
</div>

<!-- LOADER -->
<div id="loader" class="loader hidden"></div>

<footer>
© 2026 PDFBolt ⚡
</footer>

<script src="script.js"></script>

<script>
lucide.createIcons();
</script>

</body>
</html>
