<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDFBolt - All in One PDF Tools</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="logo-area">
        <img src="logo.png">
        <h2>PDFBolt ⚡</h2>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Tools</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <button class="bookmark">🔖 Bookmark</button>
    </nav>
</header>

<section class="main">

    <!-- LEFT -->
    <div class="left">
        <h1>All-in-One <span>PDF Tools</span></h1>
        <p>Free, fast and easy-to-use tools to manage your PDF files.</p>

        <div class="features">
            <div>🔒 Secure</div>
            <div>⚡ Fast</div>
            <div>☁️ Free</div>
        </div>

        <button class="cta">⚡ Explore All Tools</button>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="tool">
            <div class="icon purple">📷</div>
            <p>Image to PDF</p>
        </div>

        <div class="tool">
            <div class="icon blue">📄</div>
            <p>Merge PDF</p>
        </div>

        <div class="tool">
            <div class="icon green">🗜</div>
            <p>Compress PDF</p>
        </div>

        <div class="tool">
            <div class="icon orange">✂️</div>
            <p>Split PDF</p>
        </div>

        <div class="tool">
            <div class="icon blue">📘</div>
            <p>PDF → Word</p>
        </div>

        <div class="tool">
            <div class="icon green">📝</div>
            <p>Word → PDF</p>
        </div>

        <div class="tool">
            <div class="icon yellow">🔄</div>
            <p>Rotate PDF</p>
        </div>

        <div class="tool">
            <div class="icon purple">🔒</div>
            <p>Protect PDF</p>
        </div>

    </div>

</section>

<footer>
    © 2026 PDFBolt
</footer>

</body>
</html>
